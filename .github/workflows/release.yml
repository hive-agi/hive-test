name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # A manually-edited VERSION (minor/major bump) wins: if its tag is free
      # it is used as-is. If VERSION is already tagged, auto-bump the patch
      # (A.B.X+1) until a free tag is found and commit the bump. The bot push
      # uses the default GITHUB_TOKEN, which never re-triggers this workflow.
      - name: Resolve version (auto-bump patch when already tagged)
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file not found"
            exit 1
          fi
          VERSION=$(tr -d '[:space:]' < VERSION)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            IFS=. read -r MAJ MIN PAT <<< "${VERSION}"
            while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
              PAT=$((PAT + 1))
            done
            VERSION="${MAJ}.${MIN}.${PAT}"
            echo "${VERSION}" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "release: v${VERSION}"
            git push origin HEAD:main
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
