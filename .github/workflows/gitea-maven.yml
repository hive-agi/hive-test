name: Private Maven

# Publishes to the private hive-agi Gitea Maven registry on every main push.
# Idempotent: build.clj deploy-private no-ops when VERSION already exists there.
# Works both as .github/workflows/ (GitHub-homed libs) and .gitea/workflows/
# (Gitea-only libs) — Gitea Actions runs the same syntax; define the secrets
# on the matching host (repo or org level): GITEA_MAVEN_USERNAME, GITEA_MAVEN_TOKEN.

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-private:
    runs-on: ubuntu-latest
    env:
      GITEA_MAVEN_USERNAME: ${{ secrets.GITEA_MAVEN_USERNAME }}
      GITEA_MAVEN_TOKEN: ${{ secrets.GITEA_MAVEN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # version fallback uses git-count-revs

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Deploy to private Gitea Maven
        if: env.GITEA_MAVEN_TOKEN != ''
        run: clojure -T:build deploy-private
